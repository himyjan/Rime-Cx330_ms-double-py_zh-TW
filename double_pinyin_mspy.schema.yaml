# Rime schema
# encoding: utf-8

schema:
  schema_id: double_pinyin_mspy
  name: MSPYйӣҷжӢј
  version: "0.15"
  author:
    - дҪӣжҢҜ <chen.sst@gmail.com>
  description: |
    жңҷжңҲжӢјйҹіпјӢMSPYйӣҷжӢјж–№жЎҲгҖӮ
  dependencies:
    - stroke

switches:
  - name: ascii_mode
    reset: 0
    states: ["дёӯж–Ү", "иҘҝж–Ү"]
  - name: full_shape
    #еҖӢдәәзҝ’ж…ЈеҚҠи§’
    reset: 0
    states: ["еҚҠи§’", "е…Ёи§’"]
  - name: simplification
    states: ["жјўеӯ—", "жұүеӯ—"]
  - name: ascii_punct
    #еҖӢдәәзҝ’ж…ЈиӢұж–ҮжЁҷй»һ
    reset: 1
    states: ["гҖӮпјҢ", "пјҺпјҢ"]

bindings:
  - { accept: "Control+p", send: Up, when: composing }
  - { accept: "Control+n", send: Down, when: composing }
  - { accept: "Control+b", send: Left, when: composing }
  - { accept: "Control+f", send: Right, when: composing }
  - { accept: "Control+a", send: Home, when: composing }
  - { accept: "Control+e", send: End, when: composing }
  - { accept: "Control+d", send: Delete, when: composing }
  - { accept: "Control+k", send: "Shift+Delete", when: composing }
  - { accept: "Control+h", send: BackSpace, when: composing }
  - { accept: "Control+g", send: Escape, when: composing }
  - { accept: "Control+bracketleft", send: Escape, when: composing }
  - { accept: "Alt+v", send: Page_Up, when: composing }
  - { accept: "Control+v", send: Page_Down, when: composing }
  - { accept: ISO_Left_Tab, send: "Shift+Left", when: composing }
  - { accept: "Shift+Tab", send: "Shift+Left", when: composing }
  - { accept: Tab, send: "Shift+Right", when: composing }
  - { accept: minus, send: Page_Up, when: has_menu }
  - { accept: equal, send: Page_Down, when: has_menu }
  - { accept: comma, send: Page_Up, when: paging }
  - { accept: period, send: Page_Down, when: has_menu }
  - { accept: "Control+Shift+1", select: .next, when: always }
  - { accept: "Control+Shift+2", toggle: ascii_mode, when: always }
  - { accept: "Control+Shift+3", toggle: full_shape, when: always }
  - { accept: "Control+Shift+4", toggle: simplification, when: always }
  - { accept: "Control+Shift+5", toggle: extended_charset, when: always }
  - { accept: "Control+Shift+exclam", select: .next, when: always }
  - { accept: "Control+Shift+at", toggle: ascii_mode, when: always }
  - { accept: "Control+Shift+numbersign", toggle: full_shape, when: always }
  - { accept: "Control+Shift+dollar", toggle: simplification, when: always }
  - { accept: "Control+Shift+percent", toggle: extended_charset, when: always }
  - { accept: "Shift+space", toggle: full_shape, when: always }
  - { accept: "Control+period", toggle: ascii_punct, when: always }

menu:
  #иЁӯзҪ®еҫҢйҒёй …зҲІдә”еҖӢ
  page_size: 5

full_shape:
  " ": { commit: "гҖҖ" }
  "!": { commit: "пјҒ" }
  '"': { pair: ["вҖң", "вҖқ"] }
  "#": ["пјғ", "вҢҳ"]
  "$": ["пҝҘ", "$", "вӮ¬", "ВЈ", "ВҘ", "Вў", "ВӨ"]
  "%": ["пј…", "В°", "в„ғ"]
  "&": "пјҶ"
  "'": { pair: ["вҖҳ", "вҖҷ"] }
  "(": "пјҲ"
  ")": "пјү"
  "*": ["пјҠ", "В·", "гғ»", "Г—", "вҖ»", "вқӮ"]
  "+": "пјӢ"
  ",": { commit: "пјҢ" }
  "-": "пјҚ"
  .: { commit: "гҖӮ" }
  "/": ["пјҸ", "Г·"]
  "<": ["гҖҠ", "гҖҲ", "В«", "вҖ№"]
  "=": "пјқ"
  ">": ["гҖӢ", "гҖү", "В»", "вҖә"]
  "?": { commit: "пјҹ" }
  "@": ["пј ", "вҳҜ"]
  "[": ["гҖҢ", "гҖҗ", "гҖ”", "пј»"]
  "\\": ["гҖҒ", "пјј"]
  "]": ["гҖҚ", "гҖ‘", "гҖ•", "пјҪ"]
  "^": { commit: "вҖҰвҖҰ" }
  _: "вҖ”вҖ”"
  "`": "пҪҖ"
  "{": ["гҖҺ", "гҖ–", "пҪӣ"]
  "|": ["В·", "пҪң", "В§", "ВҰ"]
  "}": ["гҖҸ", "гҖ—", "пҪқ"]
  "~": "пҪһ"

half_shape:
  "!": { commit: "пјҒ" }
  '"': { pair: ["вҖң", "вҖқ"] }
  "#": "#"
  "$": ["пҝҘ", "$", "вӮ¬", "ВЈ", "ВҘ", "Вў", "ВӨ"]
  "%": ["%", "пј…", "В°", "в„ғ"]
  "&": "&"
  "'": { pair: ["вҖҳ", "вҖҷ"] }
  "(": "пјҲ"
  ")": "пјү"
  "*": ["*", "пјҠ", "В·", "гғ»", "Г—", "вҖ»", "вқӮ"]
  "+": "+"
  ",": { commit: "пјҢ" }
  "-": "-"
  .: { commit: "гҖӮ" }
  "/": ["гҖҒ", "/", "пјҸ", "Г·"]
  "<": ["гҖҠ", "гҖҲ", "В«", "вҖ№"]
  "=": "="
  ">": ["гҖӢ", "гҖү", "В»", "вҖә"]
  "?": { commit: "пјҹ" }
  "@": "@"
  "[": ["гҖҢ", "гҖҗ", "гҖ”", "пј»"]
  "\\": ["гҖҒ", "\\", "пјј"]
  "]": ["гҖҚ", "гҖ‘", "гҖ•", "пјҪ"]
  "^": { commit: "вҖҰвҖҰ" }
  _: "вҖ”вҖ”"
  "`": "`"
  "{": ["гҖҺ", "гҖ–", "пҪӣ"]
  "|": ["В·", "|", "пҪң", "В§", "ВҰ"]
  "}": ["гҖҸ", "гҖ—", "пҪқ"]
  "~": ["~", "пҪһ"]

patterns:
  email: "^[A-Za-z][-_.0-9A-Za-z]*@.*$"
  # reverse_lookup: "`[a-z]*'?$"
  uppercase: "[A-Z][-_+.'0-9A-Za-z]*$"
  url: "^(www[.]|https?:|ftp[.:]|mailto:|file:).*$|^[a-z]+[.].+$"

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - reverse_lookup_translator
    - script_translator
    - table_translator@custom_phrase #иЎЁзӨәи°ғз”Ёcustom_phraseж®өзј–з Ғ
  filters:
    - simplifier
    - uniquifier
    - simplifier@emoji_conversion

speller:
  alphabet: zyxwvutsrqponmlkjihgfedcba;
  initials: zyxwvutsrqponmlkjihgfedcba
  delimiter: " '"
  algebra:
    - erase/^xx$/
    - derive/^([jqxy])u$/$1v/
    - derive/^([aoe].*)$/o$1/
    - xform/^([ae])(.*)$/$1$1$2/
    - xform/iu$/Q/
    - xform/[iu]a$/W/
    - xform/er$|[uv]an$/R/
    - xform/[uv]e$/T/
    - xform/v$|uai$/Y/
    - xform/^sh/U/
    - xform/^ch/I/
    - xform/^zh/V/
    - xform/uo$/O/
    - xform/[uv]n$/P/
    - xform/i?ong$/S/
    - xform/[iu]ang$/D/
    - xform/(.)en$/$1F/
    - xform/(.)eng$/$1G/
    - xform/(.)ang$/$1H/
    - xform/ian$/M/
    - xform/(.)an$/$1J/
    - xform/iao$/C/
    - xform/(.)ao$/$1K/
    - xform/(.)ai$/$1L/
    - xform/(.)ei$/$1Z/
    - xform/ie$/X/
    - xform/ui$/V/
    - derive/T$/V/
    - xform/(.)ou$/$1B/
    - xform/in$/N/
    - xform/ing$/;/
    - xlit/QWRTYUIOPSDFGHMJCKLZXVBN/qwrtyuiopsdfghmjcklzxvbn/
    #- abbrev/^(.).+$/$1/

translator:
  dictionary: luna_pinyin
  prism: double_pinyin_mspy
  preedit_format:
    - xform/([aoe])(\w)/0$2/
    - xform/([bpmnljqxy])n/$1in/
    - xform/(\w)g/$1eng/
    - xform/(\w)q/$1iu/
    - xform/([gkhvuirzcs])w/$1ua/
    - xform/(\w)w/$1ia/
    - xform/([dtnlgkhjqxyvuirzcs])r/$1uan/
    - xform/0r/er/
    - xform/([dtgkhvuirzcs])v/$1ui/
    - xform/(\w)v/$1ve/
    - xform/(\w)t/$1ve/
    - xform/([gkhvuirzcs])y/$1uai/
    - xform/(\w)y/$1v/
    - xform/([dtnlgkhvuirzcs])o/$1uo/
    - xform/(\w)p/$1un/
    - xform/([jqx])s/$1iong/
    - xform/(\w)s/$1ong/
    - xform/([jqxnl])d/$1iang/
    - xform/(\w)d/$1uang/
    - xform/(\w)f/$1en/
    - xform/(\w)h/$1ang/
    - xform/(\w)j/$1an/
    - xform/(\w)k/$1ao/
    - xform/(\w)l/$1ai/
    - xform/(\w)z/$1ei/
    - xform/(\w)x/$1ie/
    - xform/(\w)c/$1iao/
    - xform/(\w)b/$1ou/
    - xform/(\w)m/$1ian/
    - xform/(\w);/$1ing/
    - xform/0(\w)/$1/
    - "xform/(^|[ '])v/$1zh/"
    - "xform/(^|[ '])i/$1ch/"
    - "xform/(^|[ '])u/$1sh/"
    - xform/([jqxy])v/$1u/
    - xform/([nl])v/$1Гј/

reverse_lookup:
  dictionary: stroke
  enable_completion: true
  prefix: "`"
  suffix: "'"
  tips: гҖ”зӯҶз•«гҖ•
  preedit_format:
    - xlit/hspnz/дёҖдёЁдёҝдё¶д№ҷ/
  comment_format:
    - xform/([nl])v/$1Гј/

punctuator:
  import_preset: default

key_binder:
  import_preset: default

recognizer:
  import_preset: default
  patterns:
    reverse_lookup: "`[a-z]*'?$"
